seed: 42

data:
  noisy_path: "data/noisy_train_19k_harder.npy"
  clean_path: "data/clean_train_19k_harder.npy"
  test_noisy_path: "data/noisy_val_1k_harder.npy"
  val_split: 0.05

output_dir: "results/attention_residual"

experiment_groups:

  u_net_attention:
    model:
      architecture: unet_attention
      features: [64, 128, 256]
      dropout: 0.0
    training:
      epochs: 60
      batch_size: 32
      optimizer: adamw
      lr: 5.0e-4
      weight_decay: 1.0e-4
      scheduler: cosine
      loss: mse

  u_net_residual:
    model:
      architecture: res_unet
      features: [64, 128, 256]
      dropout: 0.0
    training:
      epochs: 60
      batch_size: 32
      optimizer: adamw
      lr: 5.0e-4
      weight_decay: 1.0e-4
      scheduler: cosine
      loss: mse
